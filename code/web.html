<!DOCTYPE html>
<html>
<head>
<title>Water Management System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
.page { display: none; }
.page.active { display: block; }
.login-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.login-box { background: white; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
.login-box h1 { color: #667eea; text-align: center; margin-bottom: 30px; }
.input-group { margin-bottom: 20px; }
.input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
.input-group input, .input-group select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
.btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
.btn-login { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.btn-logout { background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 10px 20px; }
header { background: rgba(255,255,255,0.1); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
.container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
.card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
.card h2 { color: #667eea; margin-bottom: 15px; font-size: 18px; }
.value { font-size: 32px; font-weight: bold; color: #667eea; margin-top: 10px; }
.btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
.btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
.controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 15px; }
.controls button { padding: 12px; }
table { width: 100%; border-collapse: collapse; margin-top: 15px; }
table th { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 12px; text-align: left; }
table td { padding: 12px; border-bottom: 1px solid #ddd; }
.status-ok { color: #10b981; font-weight: bold; padding: 12px; background: rgba(16,185,129,0.1); border-radius: 8px; }
.status-danger { color: #ef4444; font-weight: bold; padding: 12px; background: rgba(239,68,68,0.1); border-radius: 8px; }
.payment-btns { display: flex; gap: 10px; margin-top: 10px; }
.payment-btns button { flex: 1; padding: 12px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
  <div class="login-page">
    <div class="login-box">
      <h1>💧 Water System</h1>
      <div class="input-group">
        <label>User Type</label>
        <select id="userType">
          <option value="owner">Owner</option>
          <option value="house1">House 1</option>
          <option value="house2">House 2</option>
        </select>
      </div>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="any" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="any" />
      </div>
